apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: wardkitten-pre
  labels: { app: worker, namespace: wardkitten-pre }
spec:
  revisionHistoryLimit: 0
  replicas: 1
  selector:
    matchLabels: { app: worker }
  template:
    metadata:
      name: worker
      namespace: wardkitten-pre
      labels: { app: worker, namespace: wardkitten-pre }
    spec:
      containers:
        - name: worker
          image: ghcr.io/nimitaco/wardkitten-worker:1
          imagePullPolicy: Always
          envFrom:
            - configMapRef: { name: wardkitten-config }
            - secretRef: { name: wardkitten-secrets }
      restartPolicy: Always
      imagePullSecrets:
        - name: avanware.ghcr.io
