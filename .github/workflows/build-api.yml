name: Build

on:
  push:
    branches: [main, Release]
    paths:
      - 'src/Wardkitten.Api/**'
      - 'src/Wardkitten.Application/**'
      - 'src/Wardkitten.Infrastructure/**'
      - 'src/Wardkitten.Domain/**'
      - 'src/Wardkitten.Shared.Contracts/**'
      - '.github/workflows/build-api.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push API
        uses: docker/build-push-action@v6
        with:
          context: .
          file: src/Wardkitten.Api/Dockerfile
          push: true
          tags: |
            ghcr.io/nimitaco/wardkitten:${{ github.run_number }}
            ghcr.io/nimitaco/wardkitten:latest
